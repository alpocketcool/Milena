<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Komiks Mileny</title>

<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0f1220;
    color: white;
  }

  .scene {
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    padding: 20px;
    box-sizing: border-box;
  }

  .panel {
    background: #1c2140;
    border-radius: 16px;
    padding: 20px;
    max-width: 500px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.4);
  }

  .emoji {
    font-size: 60px;
    margin-bottom: 10px;
  }

  h2 {
    margin: 10px 0;
    font-size: 22px;
  }

  p {
    font-size: 16px;
    opacity: 0.9;
  }

  .hint {
    position: fixed;
    bottom: 10px;
    width: 100%;
    text-align: center;
    font-size: 12px;
    opacity: 0.5;
  }
</style>
</head>

<body>

<!-- KLATKA 1 -->
<div class="scene" style="background: linear-gradient(180deg,#ffcc00,#ff6b6b);">
  <div class="panel">
    <div class="emoji">🐱</div>
    <h2>Znikający kot</h2>
    <p>Milena rysuje kota… ale kot nagle ucieka z kartki!</p>
  </div>
</div>

<!-- KLATKA 2 -->
<div class="scene" style="background: linear-gradient(180deg,#4facfe,#00f2fe);">
  <div class="panel">
    <div class="emoji">⚡</div>
    <h2>Pikachu interweniuje</h2>
    <p>Pikachu mówi: „spokojnie, ja go złapię w kolor!”</p>
  </div>
</div>

<!-- KLATKA 3 -->
<div class="scene" style="background: linear-gradient(180deg,#a18cd1,#fbc2eb);">
  <div class="panel">
    <div class="emoji">🎨</div>
    <h2>Nowy świat</h2>
    <p>Kot wraca… ale już w kolorowym świecie Mileny.</p>
  </div>
</div>

<div class="hint">⬇ scrolluj dalej</div>

</body>
</html>
